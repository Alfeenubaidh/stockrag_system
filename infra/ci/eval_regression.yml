name: Eval Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:v1.9.2
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -sf http://localhost:6333/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run evaluation
        working-directory: backend
        env:
          QDRANT_URL: http://localhost:6333
        run: |
          python evaluation/e2e_eval.py --sample 10 | tee /tmp/eval_output.txt

      - name: Check avg_E2E threshold
        run: |
          python - << 'EOF'
          import json, sys, re

          text = open("/tmp/eval_output.txt").read()
          # The summary JSON block is printed after the "EVALUATION SUMMARY" header
          match = re.search(r'\{[^{}]*"avg_E2E"[^{}]*\}', text, re.DOTALL)
          if not match:
              print("ERROR: could not find eval summary JSON in output")
              sys.exit(1)

          summary = json.loads(match.group())
          avg_e2e = summary.get("avg_E2E", 0.0)
          print(f"avg_E2E = {avg_e2e}")

          if avg_e2e < 0.75:
              print(f"FAIL: avg_E2E {avg_e2e:.4f} is below threshold 0.75")
              sys.exit(1)

          print("PASS: eval regression check passed")
          EOF
