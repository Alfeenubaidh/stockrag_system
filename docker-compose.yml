services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      QDRANT_URL: http://qdrant:6333
      # OLLAMA_URL must point to your host Ollama instance when running locally.
      # Override via .env: OLLAMA_URL=http://host.docker.internal:11434
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro

volumes:
  qdrant_data:
